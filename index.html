<!DOCTYPE html>
<html lang="en">

<head>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2Z69W9KDT7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-2Z69W9KDT7');
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IOW Car Finder | Used Cars from Isle of Wight Garages</title>
  <link rel="preload" as="image" href="/images/hero-mobile.webp" media="(max-width: 560px)">
  <link rel="preload" as="image" href="/images/hero-desktop.webp" media="(min-width: 561px)">


  <style>
    :root {
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.72);
      --muted2: rgba(255, 255, 255, 0.55);

      /* ONE accent colour */
      --accent: #ff8c00;
      --accentBorder: rgba(255, 140, 0, 0.32);
      --glass: rgba(255, 255, 255, 0.16);
      --glass2: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.14);
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.55);
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: #0b0c0f;
    }

    .hero {
      min-height: 100vh;

      background: #0b0c0f;
      /* fallback */

      display: flex;
      align-items: center;
      justify-content: center;

      position: relative;
      overflow: hidden;
    }

    /* overlay */
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;

      background:
        linear-gradient(180deg,
          rgba(0, 0, 0, .05) 0%,
          rgba(0, 0, 0, .24) 55%,
          rgba(0, 0, 0, .34) 100%),
        url("/images/hero-desktop.webp") center 75% / cover no-repeat;
    }

    .wrap {
      position: relative;
      z-index: 2;
      width: min(980px, 92vw);
      margin: 0 auto;
      padding: 0 24px 40px;
      transform: translateY(-35px);
    }

    .kicker {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--muted);
      font-size: 0.92rem;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);

      text-align: center;
      margin: 0 auto 20px auto;

      width: fit-content;
    }

    .brand {
      margin: 18px 0 10px;
      font-size: clamp(2.2rem, 4.8vw, 3.35rem);
      letter-spacing: 0.3px;
      line-height: 1.08;
      text-shadow: 0 14px 40px rgba(0, 0, 0, 0.55);

      text-align: center;
      margin: 0 auto;
    }

    .brand span {
      color: var(--accent);
    }

    .brand-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 12px;
    }

    .iow-shape {
      width: 72px;
      height: auto;
      display: block;
      margin-bottom: 12px;
      opacity: 0.9;
    }

    /* Keep the underline but make it calmer */
    .brand::after {
      display: none;
    }

    .brand-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 10px;
    }

    .iow-shape {
      width: 103px;
      opacity: .65;
      margin: 8px auto 6px;
      display: block;
      filter: drop-shadow(0 0 6px rgba(255, 140, 0, .35));
    }

    .brand {
      margin: 0;
    }

    .headline {
      margin: 0 auto;
      max-width: 52ch;
      color: var(--muted);
      font-size: clamp(1rem, 1.6vw, 1.08rem);
      line-height: 1.55;

      text-align: center;
      margin: 0 auto;
    }

    /* Cards: remove “big bar feel” by giving them their own glow instead */
    .panel {
      margin: 20px auto 0;
      display: flex;
      gap: 18px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .cardlink {
      text-decoration: none;
      color: var(--text);
      display: block;
    }

    .card {
      width: 170px;
      height: 88px;
      border-radius: 18px;
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.55);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      user-select: none;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 22px 55px rgba(0, 0, 0, 0.65);
      border-color: rgba(255, 255, 255, 0.20);
    }

    /* Primary: use accent ONLY once here (not also on button) */
    .card.primary {
      border-color: var(--accentBorder);
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.70), 0 0 0 1px rgba(255, 140, 0, 0.10);
      cursor: pointer;
    }

    .card.primary:hover {
      border-color: rgba(255, 140, 0, 0.55);
      box-shadow:
        0 26px 70px rgba(0, 0, 0, 0.75),
        0 0 0 2px rgba(255, 140, 0, 0.12),
        0 0 18px rgba(255, 140, 0, 0.35);
      transform: translateY(-6px) scale(1.02);
    }

    .card.disabled {
      opacity: 0.62;
      cursor: default;
    }

    .card.disabled:hover {
      transform: none;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.55);
      border-color: var(--border);
    }

    .icon {
      font-size: 2.05rem;
      margin-bottom: 6px;
    }

    .label {
      margin: 0;
      font-weight: 750;
      font-size: 1.03rem;
    }

    .hint {
      margin: 6px 0 0;
      font-size: 0.84rem;
      color: var(--muted2);
    }

    /* ticks: slimmer, less chunky */
    .trustline {
      margin-top: 6px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .tick {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* “For garages” button: neutral glass with a tiny accent edge */
    .garage-mini {
      margin-top: 6px;
      display: flex;
      justify-content: center;
    }

    .garage-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(18, 20, 24, .42);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: var(--text);
      text-decoration: none;
      font-weight: 750;
      letter-spacing: 0.2px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: transform 0.18s ease, border-color 0.18s ease;
      position: relative;
    }

    /* tiny accent strip so it feels branded but not loud */
    .garage-pill::before {
      content: "";
      position: absolute;
      left: 10px;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 140, 0, 0.75);
      box-shadow: 0 8px 22px rgba(255, 140, 0, 0.16);
    }

    .garage-pill span {
      margin-left: 10px;
      /* leaves room for dot */
    }

    .garage-pill:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.22);
    }

    /* Hide Featured only */
    .panel .cardlink:nth-child(3) {
      display: none;
    }

    .panel {
      justify-content: center;
    }

    /* MOBILE HERO IMAGE */
    @media (max-width: 560px) {

      .hero {
        min-height: 100vh;
        align-items: flex-start;
      }

      .hero::before {
        background:
          linear-gradient(180deg,
            rgba(0, 0, 0, .08) 0%,
            rgba(0, 0, 0, .16) 45%,
            rgba(0, 0, 0, .55) 100%),
          url("/images/hero-mobile.webp") center 38% / cover no-repeat;
      }

      .wrap {
        padding-top: 40px;
        padding-bottom: 20px;
        transform: none;
      }

      .brand {
        font-size: 2.15rem;
      }

      .headline {
        font-size: 1rem;
        line-height: 1.42;
        max-width: 330px;
      }

      .iow-shape {
        display: none;
      }

      .panel {
        margin-top: 55px;
        gap: 12px;
        flex-wrap: nowrap;
      }

      .card {
        width: 150px;
        height: 86px;
        border-radius: 22px;
        background: rgba(255, 255, 255, .18);
        border: 1px solid rgba(255, 255, 255, .38);
        box-shadow: 0 18px 42px rgba(0, 0, 0, .28);
      }

      .card.primary {
        border: 2px solid rgba(255, 140, 0, .55);
      }

      .label {
        font-size: .95rem;
      }

      .hint {
        font-size: .78rem;
        margin-top: 5px;
      }

      .trustline {
        margin-top: 240px;
        gap: 8px;
        flex-direction: column;
        align-items: center;
      }

      .tick {
        min-width: 250px;
        justify-content: center;
        padding: 7px 16px;
        font-size: .88rem;
        background: rgba(6, 17, 31, .62);
        border: 1px solid rgba(255, 255, 255, .18);
      }

      .garage-mini {
        margin-top: 12px;
      }

      .garage-pill {
        min-width: 260px;
        justify-content: center;
        padding: 12px 18px;
        background: rgba(6, 17, 31, .82);
        border: 1px solid rgba(255, 255, 255, .20);
      }
    }


    /* hide IOW outline */
    .iow-shape {
      display: none;
    }

    /* TABLET */
    @media (min-width: 561px) and (max-width: 900px) {
      .hero::before {
        background:
          linear-gradient(180deg,
            rgba(0, 0, 0, .05) 0%,
            rgba(0, 0, 0, .22) 55%,
            rgba(0, 0, 0, .38) 100%),
          url("/images/hero-desktop.webp") center 72% / cover no-repeat;
      }

      .wrap {
        transform: translateY(-35px);
        padding-bottom: 30px;
      }

      .panel {
        margin-top: 18px;
        gap: 16px;
      }

      .card {
        width: 180px;
        height: 92px;
      }

      .trustline {
        margin-top: 42px;
      }

      .garage-mini {
        margin-top: 16px;
      }
    }

    /* DESKTOP */
    @media (min-width: 901px) {
      .hero::before {
        background:
          linear-gradient(180deg,
            rgba(0, 0, 0, .04) 0%,
            rgba(0, 0, 0, .18) 55%,
            rgba(0, 0, 0, .32) 100%),
          url("/images/hero-desktop.webp") center 75% / cover no-repeat;
      }

      .wrap {
        transform: translateY(-35px);
        padding-bottom: 30px;
      }

      .brand,
      .headline,
      .panel {
        transform: translateY(-105px);
      }

      .panel {
        margin-top: 24px;
        gap: 22px;
      }

      .card {
        width: 190px;
        height: 96px;
        border-radius: 20px;
      }

      .trustline {
        margin-top: 18px;
        transform: translateY(190px);
      }

      .garage-mini {
        margin-top: 14px;
        transform: translateY(190px);
      }
    }
  </style>
</head>

<body>

  <section class="hero">

    <div class="wrap">

      <h1 class="brand"><span>IOW</span> Car Finder</h1>

      <p class="headline">
        Browse used cars from Isle of Wight garages and contact dealers directly.
      </p>

      <img class="iow-shape" src="/images/iow-outline-glow.svg" alt="" aria-hidden="true">

      <div class="panel">
        <a class="cardlink" href="/cars-page" aria-label="Browse Cars">
          <div class="card primary">
            <div class="cardtext">
              <p class="label">Browse Cars</p>
              <p class="hint">Recently added</p>
            </div>
          </div>
        </a>

        <a class="cardlink" href="/garages" aria-label="Browse Garages">
          <div class="card">
            <div class="cardtext">
              <p class="label">Browse Garages</p>
              <p class="hint">View local dealers</p>
            </div>
          </div>
        </a>
      </div>

      <div class="trustline">
        <span class="tick">✔ Island garages only</span>
        <span class="tick">✔ No private sellers</span>
      </div>

      <div class="garage-mini">
        <a class="garage-pill" href="/for-garages">
          <span>For garages: get listed →</span>
        </a>
      </div>

    </div>
  </section>
</body>

</html>
