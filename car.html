<!DOCTYPE html>
<html lang="en">

<head>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2Z69W9KDT7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-2Z69W9KDT7');
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car Details | IOW Car Finder</title>

  <style>
    :root {
      --bg: #f7f7f8;
      --card: #fff;
      --text: #111827;
      --muted: #6b7280;
      --brand: #2c3e50;
      --accent: #e67e22;
      --shadow: 0 10px 24px rgba(0, 0, 0, .08);
      --border: 1px solid rgba(0, 0, 0, .07);
      --r: 16px;
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text)
    }

    header {
      background: rgba(0, 0, 0, .75);
      color: #fff;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
      backdrop-filter: blur(6px)
    }

    header .top {
      max-width: 1180px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px
    }

    header a {
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      letter-spacing: .2px
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 10px 14px 18px
    }

    .backRow {
      display: flex;
      align-items: center;
      margin: 0 0 10px
    }

    .backLink {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #fff;
      border-radius: 12px;
      text-decoration: none;
      color: var(--brand);
      border: var(--border);
      box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
      font-weight: 800
    }

    .status {
      background: var(--card);
      border: var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      padding: 14px
    }

    .layout {
      display: grid;
      grid-template-columns: 1.35fr 1fr;
      gap: 14px;
      align-items: start
    }

    @media (max-width:900px) {
      .layout {
        grid-template-columns: 1fr
      }
    }

    .card {
      background: var(--card);
      border: var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow)
    }

    .gallery {
      padding: 12px;
      display: grid;
      gap: 10px
    }

    .main-img {
      width: 100%;
      height: 460px;
      object-fit: contain;
      background: #f3f4f6;
      border-radius: 14px;
      display: block;
      cursor: zoom-in
    }

    .thumbs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap
    }

    .thumb {
      width: 86px;
      height: 62px;
      object-fit: contain;
      background: #f3f4f6;
      border-radius: 12px;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 4px;
      transition: transform .08s ease
    }

    .thumb:hover {
      transform: translateY(-1px)
    }

    .thumb.active {
      border-color: var(--accent)
    }

    @media(max-width:900px) {
      .main-img {
        height: 340px
      }
    }

    @media(max-width:600px) {
      .main-img {
        height: 280px
      }

      .thumb {
        width: 72px;
        height: 54px
      }
    }

    .info {
      padding: 14px 14px 12px
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.45rem;
      line-height: 1.1;
      color: var(--brand);
      font-weight: 900
    }

    h1 span {
      color: #e67e22;
    }

    .price {
      margin: 4px 0 6px;
      font-size: 1.25rem;
      font-weight: 900;
      color: #0f172a
    }

    .listedDate {
      margin: -2px 0 10px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .sectionTitle {
      margin: 12px 0 8px;
      font-size: 1.05rem;
      font-weight: 900;
      color: #111827
    }

    .specGrid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .specItem {
      padding: 8px 9px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid rgba(0, 0, 0, .06);
    }

    .specLabel {
      font-size: .7rem;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .specValue {
      font-size: .9rem;
      font-weight: 800;
    }

    .descBox {
      background: #f8fafc;
      border: 1px solid rgba(0, 0, 0, .06);
      border-radius: 14px;
      padding: 12px;
      line-height: 1.55;
      font-size: 15px;
      color: #334155;
      white-space: pre-line
    }

    .extrasList {
      margin: 0;
      padding-left: 18px;
      line-height: 1.7
    }

    .extrasList li {
      margin: 4px 0
    }

    .btnRow {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 900;
      border: 0;
      cursor: pointer;
      user-select: none
    }

    .btn.primary {
      background: var(--accent);
      color: #fff
    }

    .btn.ghost {
      background: #fff;
      color: var(--brand);
      border: 1px solid rgba(0, 0, 0, .12)
    }

    .btn.disabled {
      opacity: .55;
      pointer-events: none
    }

    .shareBtn {
      font-size: 15px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .small {
      color: #667085;
      font-size: .9rem;
      margin-top: 6px;
      line-height: 1.4
    }

    .trust {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      background: #fff;
      border: var(--border);
      box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
      border-left: 6px solid var(--brand);
      line-height: 1.55
    }

    .trust a {
      color: var(--brand);
      font-weight: 900;
      text-decoration: none
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .88);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 18px
    }

    .lightbox.open {
      display: flex
    }

    .lbImg {
      max-width: min(1200px, 95vw);
      max-height: 86vh;
      object-fit: contain;
      border-radius: 14px;
      background: #111
    }

    .lbClose,
    .lbNav {
      position: absolute;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      background: rgba(255, 255, 255, .92);
      font-weight: 900
    }

    .lbClose {
      top: 14px;
      right: 14px;
      width: 44px;
      height: 44px;
      font-size: 18px
    }

    .lbNav {
      top: 50%;
      transform: translateY(-50%);
      width: 54px;
      height: 54px;
      font-size: 34px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none
    }

    .lbPrev {
      left: 14px
    }

    .lbNext {
      right: 14px
    }

    .lbCount {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 14px;
      opacity: .9;
      font-weight: 700;
    }

    .btnRowTight {
      gap: 8px
    }

    .btnRowTight .btn {
      padding: 10px 12px;
      border-radius: 12px
    }

    .actionButtons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 14px;
    }

    .actionButtons .btn {
      min-height: 54px;
      padding: 15px 16px;
      font-size: 1rem;
      font-weight: 900;
      border-radius: 14px;
    }

    .actionButtons .primary {
      background: #e67e22;
      color: #fff;
      border-color: #e67e22;
    }

    .actionButtons .ghost {
      background: #fff;
      color: #111827;
      border: 1px solid rgba(17, 24, 39, .14);
    }

    @media (max-width: 520px) {
      .actionButtons {
        grid-template-columns: 1fr 1fr;
      }
    }

  </style>
</head>

<body>
  <header>
    <div class="top">
      <a href="/">IOW Car Finder</a>
      <nav style="display:flex;gap:14px;align-items:center;">
        <a href="/cars-page">Cars</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="backRow">
      <a class="backLink" href="/cars-page">← Back to cars</a>
    </div>

    <div id="loading" class="status">Loading car…</div>

    <div id="content" class="layout" style="display:none;">
      <div class="card">
        <div class="gallery">
          <img id="mainImg" class="main-img" src="" alt="Car photo" onerror="this.src='/images/hero.png'">
          <div id="thumbs" class="thumbs"></div>
        </div>
      </div>

      <div>
        <div class="card info">
          <h1 id="carTitle"></h1>
          <div class="price" id="carPrice"></div>
          <div id="listedDate" class="listedDate"></div>

          <div id="specsWrap" style="display:none;">
            <div class="sectionTitle">Key specs</div>
            <div id="specGrid" class="specGrid"></div>
          </div>

          <div id="descWrap" style="display:none;">
            <div class="sectionTitle">Description</div>
            <div id="descBox" class="descBox"></div>
          </div>

          <div id="extrasWrap" style="display:none;">
            <div class="sectionTitle">Key features</div>
            <div class="descBox">
              <ul id="extrasList" class="extrasList"></ul>
            </div>
          </div>
        </div>

        <div class="btnRow btnRowTight actionButtons">
          <a id="callBtn" class="btn primary" href="#">📞 Call</a>

          <a id="moreBtn" class="btn ghost" href="/cars-page">🏢 View Garage</a>

          <a id="mapBtn" class="btn ghost" href="#" target="_blank" rel="noopener">📍 Directions</a>

          <button id="shareBtn" class="btn ghost shareBtn" type="button">🔗 Share</button>
        </div>

        <div class="small" id="callNote"></div>
        <div class="small" id="mapNote"></div>

        <div class="card" style="margin-top:12px;">
          <div class="info" style="padding:14px;">
            <div class="sectionTitle" style="margin-top:0;">Contact garage</div>
            <div id="garageBox" class="descBox"></div>
          </div>
        </div>

        <div class="trust">
          <strong>Not a marketplace.</strong> We don’t sell cars and we don’t take payments.
          To enquire, contact the garage directly.
          <div class="small">
            See something wrong?
            <a id="reportLink" href="mailto:contact@iowcarfinder.co.uk?subject=Report%20listing">
              Report this listing
            </a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button id="lbClose" class="lbClose" aria-label="Close">✕</button>
    <button id="lbPrev" class="lbNav lbPrev" aria-label="Previous">‹</button>
    <img id="lbImg" class="lbImg" src="" alt="Car photo fullscreen" />
    <button id="lbNext" class="lbNav lbNext" aria-label="Next">›</button>
    <div id="lbCount" class="lbCount"></div>
  </div>

  <script>
    function money(n) {
      try { return "£" + Number(n).toLocaleString("en-GB"); }
      catch { return "£" + (n ?? ""); }
    }

    function formatDateShort(value) {
      if (!value) return "";

      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return "";

      return d.toLocaleDateString("en-GB", {
        day: "numeric",
        month: "short",
        year: "numeric"
      });
    }

    function escapeText(t) {
      return String(t || "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[ch]));
    }

    function cloudinaryOptimise(url, width = 1200) {
      const u = String(url || "");
      if (!u.includes("res.cloudinary.com") || !u.includes("/image/upload/")) return u;
      return u.replace("/image/upload/", `/image/upload/f_auto,q_auto,c_limit,w_${width}/`);
    }

    function miles(n) {
      const num = Number(n);
      if (!Number.isFinite(num) || num <= 0) return "Not provided";
      return num.toLocaleString("en-GB") + " miles";
    }

    function addSpec(specGrid, label, value) {
      const v = String(value ?? "").trim();
      if (!v) return;
      const div = document.createElement("div");
      div.className = "specItem";
      div.innerHTML = `
        <div class="specLabel">${escapeText(label)}</div>
        <div class="specValue">${escapeText(v)}</div>
      `;
      specGrid.appendChild(div);
    }

    const lightbox = document.getElementById("lightbox");
    const lbImg = document.getElementById("lbImg");
    const lbClose = document.getElementById("lbClose");
    const lbPrev = document.getElementById("lbPrev");
    const lbNext = document.getElementById("lbNext");
    const lbCount = document.getElementById("lbCount");

    let photos = [];
    let currentIndex = 0;

    function openLightbox(index) {
      currentIndex = index;
      lbImg.src = photos[currentIndex];
      lbCount.textContent = `${currentIndex + 1} / ${photos.length}`;
      lightbox.classList.add("open");
      lightbox.setAttribute("aria-hidden", "false");
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      lightbox.setAttribute("aria-hidden", "true");
      lbImg.src = "";
      lbCount.textContent = "";
    }

    function nextPhoto() {
      if (!photos.length) return;
      currentIndex = (currentIndex + 1) % photos.length;
      lbImg.src = photos[currentIndex];
      lbCount.textContent = `${currentIndex + 1} / ${photos.length}`;
    }

    function prevPhoto() {
      if (!photos.length) return;
      currentIndex = (currentIndex - 1 + photos.length) % photos.length;
      lbImg.src = photos[currentIndex];
      lbCount.textContent = `${currentIndex + 1} / ${photos.length}`;
    }

    if (lbClose) lbClose.addEventListener("click", closeLightbox);
    if (lbNext) lbNext.addEventListener("click", nextPhoto);
    if (lbPrev) lbPrev.addEventListener("click", prevPhoto);
    if (lightbox) lightbox.addEventListener("click", (e) => { if (e.target === lightbox) closeLightbox(); });

    document.addEventListener("keydown", (e) => {
      if (!lightbox || !lightbox.classList.contains("open")) return;
      if (e.key === "Escape") closeLightbox();
      if (e.key === "ArrowRight") nextPhoto();
      if (e.key === "ArrowLeft") prevPhoto();
    });

    (async function init() {
      const loading = document.getElementById("loading");
      const content = document.getElementById("content");

      try {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        if (!id) {
          if (loading) loading.textContent = "Missing car id.";
          return;
        }

        const res = await fetch("/car-data?id=" + encodeURIComponent(id), { cache: "no-store" });
        const json = await res.json().catch(() => ({}));

        if (!res.ok || !json.car) {
          if (loading) loading.textContent = json.message || "Car not found.";
          return;
        }

        const car = json.car;
        const garage = json.garage;

        if (loading) loading.style.display = "none";
        if (content) content.style.display = "grid";

        const carTitle = document.getElementById("carTitle");
        const carPrice = document.getElementById("carPrice");
        const listedDate = document.getElementById("listedDate");

        if (carTitle) carTitle.textContent = car.name || "Car";
        if (carPrice) carPrice.textContent = money(car.price);

        const dateText = formatDateShort(
          car.createdAt || car.created_at || car.updatedAt || car.updated_at
        );

        if (listedDate) {
          listedDate.textContent = dateText ? "Listed: " + dateText : "";
        }

        const reportLink = document.getElementById("reportLink");
        if (reportLink) {
          reportLink.href =
            "mailto:contact@iowcarfinder.co.uk?subject=" +
            encodeURIComponent("Report listing: " + (car.name || "Unknown car"));
        }

        const MAX_PHOTOS = 20;
        photos = (Array.isArray(car.photos) ? car.photos : [])
          .map(p => cloudinaryOptimise(String(p).trim(), 1400))
          .filter(Boolean)
          .slice(0, MAX_PHOTOS);

        if (!photos.length && car.photo) {
          photos = [cloudinaryOptimise(String(car.photo).trim(), 1400)];
        }

        if (!photos.length) {
          photos = ["/images/hero.png"];
        }

        const mainImg = document.getElementById("mainImg");
        const thumbs = document.getElementById("thumbs");

        function setMain(index) {
          if (mainImg) mainImg.src = photos[index];
          if (thumbs) {
            [...thumbs.querySelectorAll("img")].forEach((el, i) => {
              el.classList.toggle("active", i === index);
            });
          }
        }

        if (thumbs) {
          thumbs.innerHTML = "";
          photos.forEach((src, i) => {
            const t = document.createElement("img");
            t.src = src;
            t.alt = "Car photo";
            t.className = "thumb" + (i === 0 ? " active" : "");
            t.addEventListener("click", () => setMain(i));
            thumbs.appendChild(t);
          });
        }

        setMain(0);

        if (mainImg) {
          mainImg.addEventListener("click", () => {
            if (!thumbs) return openLightbox(0);
            const activeIndex = [...thumbs.querySelectorAll("img")]
              .findIndex(el => el.classList.contains("active"));
            openLightbox(activeIndex >= 0 ? activeIndex : 0);
          });
        }

        const garageName = garage?.name || car.garageName || "Local garage";
        const phone = garage?.phone || "";
        const email = garage?.email || "";
        const town = garage?.town || "";
        const address = garage?.address || "";
        const postcode = garage?.postcode || "";
        const website = garage?.website || "";
        const openingHours = garage?.opening_hours || garage?.openingHours || "";

        const garageBox = document.getElementById("garageBox");
        if (garageBox) {
          let html = `<div><strong>${escapeText(garageName)}</strong></div>`;
          if (address) html += `<div>${escapeText(address)}</div>`;
          if (town) html += `<div>${escapeText(town)}</div>`;
          if (postcode) html += `<div>${escapeText(postcode)}</div>`;
          html += `<div><strong>Phone:</strong> ${phone ? escapeText(phone) : "Not provided"}</div>`;
          if (email) html += `<div><strong>Email:</strong> ${escapeText(email)}</div>`;
          if (website) html += `<div><strong>Website:</strong> <a href="${escapeText(website)}" target="_blank" rel="noopener">Visit site</a></div>`;
          if (openingHours) html += `<div><strong>Opening hours:</strong><br>${escapeText(openingHours)}</div>`;
          garageBox.innerHTML = html;
        }

        const callBtn = document.getElementById("callBtn");
        const callNote = document.getElementById("callNote");
        if (callBtn) {
          if (phone) {
            callBtn.href = "tel:" + phone.replace(/\s/g, "");
            callBtn.classList.remove("disabled");
            if (callNote) callNote.textContent = "";
          } else {
            callBtn.href = "#";
            callBtn.classList.add("disabled");
            if (callNote) callNote.textContent = "Phone number not provided.";
          }
        }

        const mapBtn = document.getElementById("mapBtn");
        const mapNote = document.getElementById("mapNote");
        if (mapBtn) {
          const mapQuery = postcode || address || town || "";
          const mapsLink = mapQuery
            ? "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(mapQuery)
            : "";

          if (mapsLink) {
            mapBtn.href = mapsLink;
            mapBtn.classList.remove("disabled");
            if (mapNote) mapNote.textContent = "";
          } else {
            mapBtn.href = "#";
            mapBtn.classList.add("disabled");
            if (mapNote) mapNote.textContent = "Location not provided.";
          }
        }

        const moreBtn = document.getElementById("moreBtn");
        if (moreBtn) {
          if (car.garageId) {
            moreBtn.href = "/garage?id=" + encodeURIComponent(car.garageId);
            moreBtn.style.display = "inline-flex";
          } else {
            moreBtn.style.display = "none";
          }
        }

        const specGrid = document.getElementById("specGrid");
        if (specGrid) {
          specGrid.innerHTML = "";
          if (car.year) addSpec(specGrid, "Year", car.year);
          addSpec(specGrid, "Mileage", miles(car.mileage));
          if (car.engine) addSpec(specGrid, "Engine", car.engine);
          if (car.fuel) addSpec(specGrid, "Fuel", car.fuel);
          if (car.transmission) addSpec(specGrid, "Transmission", car.transmission);
          if (car.colour) addSpec(specGrid, "Colour", car.colour);

          const specsWrap = document.getElementById("specsWrap");
          if (specsWrap) specsWrap.style.display = specGrid.children.length ? "block" : "none";
        }

        const descWrap = document.getElementById("descWrap");
        const descBox = document.getElementById("descBox");
        if (car.description) {
          if (descBox) descBox.textContent = car.description;
          if (descWrap) descWrap.style.display = "block";
        } else {
          if (descWrap) descWrap.style.display = "none";
        }

        const extrasWrap = document.getElementById("extrasWrap");
        const extrasList = document.getElementById("extrasList");
        if (car.extras) {
          const lines = String(car.extras).split(/\n/).map(s => s.trim()).filter(Boolean);
          if (extrasList) extrasList.innerHTML = lines.map(l => `<li>${escapeText(l)}</li>`).join("");
          if (extrasWrap) extrasWrap.style.display = "block";
        } else {
          if (extrasWrap) extrasWrap.style.display = "none";
        }

        const shareBtn = document.getElementById("shareBtn");
        if (shareBtn) {
          shareBtn.addEventListener("click", async () => {
            const shareData = {
              title: car.name || "Car on IOW Car Finder",
              text: "Check out this car on IOW Car Finder",
              url: window.location.href
            };

            if (navigator.share) {
              try {
                await navigator.share(shareData);
              } catch (err) { }
            } else {
              try {
                await navigator.clipboard.writeText(window.location.href);
                shareBtn.textContent = "Link copied!";
                setTimeout(() => {
                  shareBtn.textContent = "🔗 Share";
                }, 1800);
              } catch (err) {
                alert("Could not copy link.");
              }
            }
          });
        }

      } catch (err) {
        console.error(err);
        const loading = document.getElementById("loading");
        if (loading) loading.textContent = "Could not load car.";
      }
    })();
  </script>
</body>

</html>
