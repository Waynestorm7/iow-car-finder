<!DOCTYPE html>
<html lang="en">

<head>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2Z69W9KDT7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-2Z69W9KDT7');
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cars | IOW Car Finder</title>

  <style>
    :root {
      --bg0: #f6f7f9;
      --bg1: #eef2f6;
      --card: #ffffff;
      --text: #0b1220;
      --muted: #667085;
      --accent: #e67e22;
      --accent-soft: rgba(230, 126, 34, .12);
      --stroke: rgba(17, 24, 39, .10);
      --stroke-soft: rgba(17, 24, 39, .08);
      --radius: 16px;
      --shadow-soft: 0 10px 30px rgba(0, 0, 0, .06);
      --shadow-card: 0 8px 28px rgba(0, 0, 0, .06);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 480px at 10% -10%, rgba(230, 126, 34, .12), transparent 60%),
        radial-gradient(900px 480px at 90% -10%, rgba(17, 24, 39, .07), transparent 60%),
        linear-gradient(180deg, var(--bg0) 0%, var(--bg1) 100%);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ---------- Header ---------- */
    header {
      background: #07111d;
      color: #fff;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .top {
      width: 100%;
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 28px;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      color: #fff;
      text-decoration: none;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -.4px;
      white-space: nowrap;
    }

    .brand span {
      color: #e67e22;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    nav a {
      color: rgba(255, 255, 255, .86);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1;
    }

    nav a:hover {
      color: #fff;
    }

    @media (max-width:700px) {
      .top {
        padding: 0 12px;
        min-height: 58px;
        gap: 10px;
      }

      .brand {
        font-size: .95rem;
        white-space: nowrap;
      }

      nav {
        gap: 11px;
      }

      nav a {
        font-size: .82rem;
      }
    }

    /* ---------- Hero ---------- */
    .hero {
      max-width: 1120px;
      margin: 0 auto;
      padding: 22px 18px 10px;
      display: grid;
      gap: 8px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.6rem, 2.6vw, 2.25rem);
      font-weight: 900;
      letter-spacing: -.02em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      max-width: 70ch;
      line-height: 1.45;
    }

    /* ---------- Main + filters ---------- */
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 12px 18px 32px;
    }

    .filtersWrap {
      margin-bottom: 16px;
    }

    .filters {
      position: relative;
      background: rgba(255, 255, 255, .95);
      border: 1px solid var(--stroke);
      border-radius: 22px;
      padding: 14px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(10px);
    }

    .filters::before {
      content: "";
      display: block;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg,
          rgba(230, 126, 34, 0),
          rgba(230, 126, 34, .55),
          rgba(230, 126, 34, 0));
      margin: -4px 4px 12px;
    }

    .filtersTop {
      display: grid;
      grid-template-columns: 1.45fr 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .filtersAdvanced {
      display: grid;
      grid-template-columns: .95fr .95fr .95fr auto;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }

    .filters input,
    .filters select {
      width: 100%;
      padding: 13px 14px;
      font-size: 16px;
      border-radius: 14px;
      border: 1px solid rgba(17, 24, 39, .12);
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
      appearance: none;
      -webkit-appearance: none;
    }

    .filters input::placeholder {
      color: #8a94a6;
    }

    .filters input:hover,
    .filters select:hover {
      border-color: rgba(17, 24, 39, .18);
    }

    .filters input:focus,
    .filters select:focus {
      box-shadow: 0 0 0 4px var(--accent-soft);
      border-color: rgba(230, 126, 34, .48);
    }

    .btnRow {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
    }

    .btn {
      border-radius: 14px;
      padding: 12px 16px;
      cursor: pointer;
      border: 1px solid rgba(17, 24, 39, .10);
      background: #fff;
      color: var(--text);
      font-weight: 850;
      transition: transform .12s ease, border-color .12s ease, background .12s ease, box-shadow .12s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(17, 24, 39, .16);
      background: #fafafa;
    }

    .btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: rgba(230, 126, 34, .45);
      box-shadow: 0 10px 22px rgba(230, 126, 34, .20);
    }

    .btn.primary:hover {
      background: #de781f;
      border-color: rgba(230, 126, 34, .55);
    }

    .btn.ghost {
      background: rgba(17, 24, 39, .04);
      border: 1px solid rgba(17, 24, 39, .12);
    }

    .btn:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .hint {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: .92rem;
      margin-top: 8px;
      padding-left: 2px;
    }

    /* ---------- Grid / cards ---------- */
    .status {
      background: var(--card);
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--stroke-soft);
      color: var(--muted);
    }

    .grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .carCard {
      display: block;
      background: var(--card);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(17, 24, 39, .08);
      box-shadow: 0 10px 26px rgba(15, 23, 42, .08);
      transition: transform .14s ease, border-color .14s ease, box-shadow .14s ease;
      color: inherit;
      text-decoration: none;
    }

    .carCard:hover {
      transform: translateY(-4px);
      border-color: rgba(230, 126, 34, .28);
      box-shadow: 0 16px 36px rgba(15, 23, 42, .14);
    }

    .carCard.sold .carImg {
      filter: grayscale(100%);
      opacity: .72;
    }

    .imgWrap {
      position: relative;
      background: #eef1f5;
      aspect-ratio: 16 / 10;
      overflow: hidden;
    }

    .carImg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .18s ease;
    }

    .carCard:hover .carImg {
      transform: scale(1.025);
    }

    .soldBadge {
      position: absolute;
      left: 14px;
      top: 14px;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(17, 24, 39, .9);
      color: #fff;
      font-weight: 950;
      font-size: .82rem;
      letter-spacing: .04em;
      border: 1px solid rgba(255, 255, 255, .22);
      box-shadow: 0 8px 18px rgba(0, 0, 0, .22);
    }

    .reservedBadge {
      position: absolute;
      left: 14px;
      top: 14px;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(230, 126, 34, .96);
      color: #fff;
      font-weight: 950;
      font-size: .82rem;
      letter-spacing: .04em;
      box-shadow: 0 8px 18px rgba(0, 0, 0, .22);
    }

    .soldImg {
      filter: grayscale(100%);
    }

    .body {
      padding: 16px 16px 15px;
    }

    .name {
      margin: 0 0 7px;
      font-size: 1.05rem;
      font-weight: 850;
      line-height: 1.25;
      color: var(--text);
      letter-spacing: -.01em;
    }

    .price {
      margin: 0 0 8px;
      font-size: 1.75rem;
      font-weight: 950;
      color: #071025;
      letter-spacing: -.04em;
      line-height: 1.05;
    }

    .listedText {
      font-size: .86rem;
      color: var(--muted);
      margin: 0 0 13px;
    }

    .specGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-bottom: 12px;
    }

    .spec {
      padding: 9px 11px;
      border-radius: 14px;
      background: linear-gradient(180deg, #f7f8fa, #eef1f5);
      border: 1px solid rgba(17, 24, 39, .07);
    }

    .specLabel {
      font-size: .72rem;
      color: var(--muted);
      line-height: 1.1;
      margin-bottom: 2px;
    }

    .specValue {
      font-size: .94rem;
      font-weight: 800;
      color: #111827;
      line-height: 1.15;
    }

    /* ---------- Garage row ---------- */
    .garageRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid rgba(17, 24, 39, .06);
    }

    .garageText {
      min-width: 0;
      display: flex;
      gap: 8px;
      align-items: baseline;
      flex: 1;
    }

    .garageLabel {
      font-size: .78rem;
      color: var(--muted);
      font-weight: 500;
    }

    .garageValue {
      font-size: .98rem;
      font-weight: 600;
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .garageBtnWrap {
      flex: 0 0 auto;
    }

    .garageLink {
      font-size: inherit;
      color: #2563eb;
      font-weight: 600;
      text-decoration: none;
    }

    .garageLink:hover {
      color: #2563eb;
      text-decoration: underline;
    }

    /* ---------- Responsive ---------- */
    @media (min-width: 981px) {
      #toggleFilters {
        display: none;
      }
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .filtersTop {
        grid-template-columns: 1fr 1fr auto;
      }

      .filtersAdvanced {
        display: none;
        grid-template-columns: 1fr 1fr;
      }

      #filtersBar.is-open .filtersAdvanced {
        display: grid;
      }
    }

    @media (max-width: 600px) {
      .hero {
        padding: 10px 14px 4px;
      }

      .hero h1 {
        font-size: 1.45rem;
      }

      .hero p {
        display: none;
      }

      .filtersWrap {
        margin-bottom: 10px;
      }

      .filters::before {
        margin: -2px 4px 8px;
      }

      .grid {
        margin-top: 10px;
      }

      .filters input,
      .filters select {
        padding: 10px 12px;
        border-radius: 12px;
      }

      .filters {
        background: transparent;
        border: none;
        box-shadow: none;
        padding: 0;
      }

      .filters::before {
        display: none;
      }

      .filters input,
      .filters select,
      #toggleFilters {
        background: #fff;
        box-shadow: 0 4px 14px rgba(15, 23, 42, .06);
      }

      .btn {
        padding: 11px 12px;
        border-radius: 12px;
      }

      .filtersTop {
        gap: 8px;
      }

      .hero {
        display: none;
      }

      main {
        padding: 6px 14px 24px;
      }

      .filtersTop {
        grid-template-columns: 1fr;
      }

      .filtersAdvanced {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .btnRow {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .filtersAdvanced::before {
        content: "Filters";
        font-weight: 800;
        font-size: .92rem;
        color: var(--muted);
        margin: 2px 0 2px;
        display: block;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .carImg {
        height: 250px;
      }
    }

    @media (max-width: 520px) {
      .garageRow {
        flex-direction: column;
        align-items: stretch;
      }

      .garageBtnWrap {
        width: 100%;
      }

      .garageLink {
        width: 100%;
        text-align: center;
        white-space: normal;
      }
    }

    .backToTop {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: 76px;
      height: 44px;
      border: 0;
      border-radius: 999px;
      background: #07111d;
      color: #fff;
      font-size: 1.25rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(15, 23, 42, .25);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .backToTop.show {
      display: flex;
    }

    .backToTop:hover {
      background: #e67e22;
    }

    @media (max-width:700px) {
      .backToTop {
        left: 14px;
        right: auto;
        bottom: 82px;
        width: 64px;
        height: 38px;
        font-size: .86rem;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="top">
      <a class="brand" href="/">
        <span>IOW</span> Car Finder
      </a>
      <nav>
        <a href="/" aria-label="Home">Home</a>
        <a class="active" href="/cars-page" aria-label="Cars">Cars</a>
        <a href="/garages" aria-label="Garages">Garages</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <h1>Cars</h1>
    <p>Browse listings — filter by fuel, transmission, price and more.</p>
  </section>

  <main>
    <div class="filtersWrap">
      <div class="filters" id="filtersBar">
        <div class="filtersTop">
          <input id="searchBox" type="text" placeholder="Search (e.g. Golf, diesel, auto)…" />

          <select id="sortBox">
            <option value="recent">Sort: Recently updated</option>
            <option value="price-asc">Price: Low → High</option>
            <option value="price-desc">Price: High → Low</option>
            <option value="year-desc">Year: Newest</option>
            <option value="mileage-asc">Mileage: Lowest</option>
          </select>

          <button id="toggleFilters" class="btn ghost" aria-expanded="false" type="button">Filters</button>
        </div>

        <div class="filtersAdvanced">
          <select id="fuelBox">
            <option value="">Fuel (All)</option>
          </select>

          <select id="gearBox">
            <option value="">Transmission (All)</option>
          </select>

          <select id="maxPriceBox">
            <option value="">Max price</option>
            <option value="5000">£5,000</option>
            <option value="7500">£7,500</option>
            <option value="10000">£10,000</option>
            <option value="15000">£15,000</option>
            <option value="20000">£20,000</option>
            <option value="30000">£30,000</option>
            <option value="50000">£50,000</option>
          </select>

          <div class="btnRow">
            <button id="resetBtn" class="btn" type="button">Reset</button>
            <button id="applyBtn" class="btn primary" type="button">Apply</button>
          </div>

          <div id="countLine" class="hint">Loading…</div>
        </div>
      </div>
    </div>

    <div id="status" class="status">Loading cars…</div>
    <div id="grid" class="grid" style="display:none"></div>
  </main>

  <script>
    function safeText(s) { return String(s ?? "").trim(); }
    function norm(s) { return safeText(s).toLowerCase(); }

    function escapeHtml(t) {
      return String(t ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[ch]));
    }

    function escapeAttr(t) {
      return escapeHtml(t).replace(/"/g, "&quot;");
    }

    function money(n) {
      try {
        return "£" + Number(n).toLocaleString("en-GB");
      } catch {
        return "£" + (n ?? "");
      }
    }

    function miles(n) {
      const num = Number(n);
      if (!Number.isFinite(num) || num <= 0) return "";
      return num.toLocaleString("en-GB") + " miles";
    }

    function pickPhoto(car) {
      if (Array.isArray(car.photos) && car.photos.length) return car.photos[0];
      if (car.photo) return car.photo;
      return "/images/hero.png";
    }

    async function fetchCars() {
      const tryUrls = ["/cars", "/cars-data", "/cars.json"];
      for (const u of tryUrls) {
        try {
          const res = await fetch(u, { cache: "no-store" });
          if (!res.ok) continue;
          const data = await res.json();
          if (Array.isArray(data)) return data;
          if (data && Array.isArray(data.cars)) return data.cars;
        } catch (e) { }
      }
      return null;
    }

    function uniqueSorted(arr) {
      const set = new Set(arr.map(safeText).filter(Boolean));
      return [...set].sort((a, b) => a.localeCompare(b, "en", { sensitivity: "base" }));
    }

    let ALL = [];

    function fillDropdowns(cars) {
      const fuelBox = document.getElementById("fuelBox");
      const gearBox = document.getElementById("gearBox");

      const fuels = uniqueSorted(cars.map(c => c.fuel));
      const gears = uniqueSorted(cars.map(c => c.transmission));

      fuelBox.innerHTML =
        `<option value="">Fuel (All)</option>` +
        fuels.map(f => `<option value="${escapeAttr(f)}">${escapeHtml(f)}</option>`).join("");

      gearBox.innerHTML =
        `<option value="">Transmission (All)</option>` +
        gears.map(g => `<option value="${escapeAttr(g)}">${escapeHtml(g)}</option>`).join("");
    }

    function renderCars(cars) {
      const status = document.getElementById("status");
      const grid = document.getElementById("grid");

      if (!Array.isArray(cars) || cars.length === 0) {
        grid.style.display = "none";
        status.style.display = "block";
        status.textContent = "No cars match your filters.";
        return;
      }

      status.style.display = "none";
      grid.style.display = "grid";
      grid.innerHTML = "";

      for (const car of cars) {
        const name = safeText(car.name) || "Car";
        const href = "/car.html?id=" + encodeURIComponent(car.id || "");
        const year = safeText(car.year);
        const mi = miles(car.mileage);
        const fuel = safeText(car.fuel);
        const transmission = safeText(car.transmission);
        const garageId = safeText(car.garageId);
        const garageName = safeText(car.garageName) || "";

        const status = String(car.status || "").toLowerCase();
        const isReserved = status === "reserved";
        const isSold = status === "sold" || car.sold === true;

        const card = document.createElement("a");
        card.className = "carCard" + (isSold ? " sold" : "");
        card.href = href;

        const garageLink = garageId
          ? `<a class="garageValue garageLink" href="/garage?id=${encodeURIComponent(garageId)}" data-gid="${escapeAttr(garageId)}">${escapeHtml(garageName || "Garage")}</a>`
          : `<span class="garageValue">${escapeHtml(garageName || "—")}</span>`;

        const listedDate =
          car.createdAt ||
          car.created_at ||
          car.updatedAt ||
          car.updated_at ||
          "";
        const listedText = listedDate
          ? new Date(listedDate).toLocaleDateString("en-GB", {
            day: "numeric",
            month: "short",
            year: "numeric"
          })
          : "";

        card.innerHTML = `
      <div class="imgWrap">
<img class="carImg ${isSold ? "soldImg" : ""}" src="${escapeAttr(pickPhoto(car))}" alt="${escapeHtml(name)}" onerror="this.src='/images/hero.png'">
${isReserved ? `<div class="reservedBadge">RESERVED</div>` : ""}
${isSold ? `<div class="soldBadge">SOLD</div>` : ""}
      </div>

      <div class="body">
        <h3 class="name">${escapeHtml(name)}</h3>
        <div class="price">${escapeHtml(money(car.price))}</div>

${listedText ? `
<div class="listedText">
    Listed: ${escapeHtml(listedText)}
  </div>
` : ""}

<div class="specGrid">
  ${year ? `<div class="spec"><div class="specLabel">Year</div><div class="specValue">${escapeHtml(year)}</div></div>` : ""}
  ${mi ? `<div class="spec"><div class="specLabel">Mileage</div><div class="specValue">${escapeHtml(mi)}</div></div>` : ""}
  ${fuel ? `<div class="spec"><div class="specLabel">Fuel</div><div class="specValue">${escapeHtml(fuel)}</div></div>` : ""}
  ${transmission ? `<div class="spec"><div class="specLabel">Transmission</div><div class="specValue">${escapeHtml(transmission)}</div></div>` : ""}
</div>

<div class="garageRow">
  <div class="garageText">
    <span class="garageLabel">Garage:</span>
    ${garageLink}
  </div>
</div>
    `;

        card.addEventListener("click", (e) => {
          const gl = e.target.closest("a[data-gid]");
          if (!gl) return;
          e.preventDefault();
          e.stopPropagation();
          window.location.href = gl.getAttribute("href");
        });

        grid.appendChild(card);
      }
    }

    function applyFilters() {
      const search = norm(document.getElementById("searchBox").value);
      const sort = document.getElementById("sortBox").value;
      const fuel = norm(document.getElementById("fuelBox").value);
      const gear = norm(document.getElementById("gearBox").value);
      const maxPrice = Number(document.getElementById("maxPriceBox").value || 0);

      const garageIdParamRaw = safeText(new URLSearchParams(window.location.search).get("garageId"));
      const garageIdParam = norm(garageIdParamRaw);

      let filtered = [...ALL];

      if (garageIdParam) {
        filtered = filtered.filter(c => norm(c.garageId) === garageIdParam);
      }

      if (search) {
        filtered = filtered.filter(c => {
          const hay = [
            c.name,
            c.fuel,
            c.transmission,
            c.engine,
            c.colour,
            c.garageName,
            c.garageId
          ].map(norm).join(" ");
          return hay.includes(search);
        });
      }

      if (fuel) filtered = filtered.filter(c => norm(c.fuel) === fuel);
      if (gear) filtered = filtered.filter(c => norm(c.transmission) === gear);
      if (maxPrice > 0) filtered = filtered.filter(c => Number(c.price) <= maxPrice);

      if (sort === "price-asc") {
        filtered.sort((a, b) => (Number(a.price) || 0) - (Number(b.price) || 0));
      } else if (sort === "price-desc") {
        filtered.sort((a, b) => (Number(b.price) || 0) - (Number(a.price) || 0));
      } else if (sort === "year-desc") {
        filtered.sort((a, b) => (Number(b.year) || 0) - (Number(a.year) || 0));
      } else if (sort === "mileage-asc") {
        filtered.sort((a, b) => (Number(a.mileage) || 0) - (Number(b.mileage) || 0));
      } else {
        filtered.sort((a, b) => {
          const ta = new Date(a.updatedAt || a.updated_at || 0).getTime() || 0;
          const tb = new Date(b.updatedAt || b.updated_at || 0).getTime() || 0;
          return tb - ta;
        });
      }

      filtered.sort((a, b) => {
        function statusRank(car) {
          const status = String(car.status || "").toLowerCase();

          if (status === "sold" || car.sold === true) return 2;
          if (status === "reserved") return 1;

          return 0;
        }

        return statusRank(a) - statusRank(b);
      });


      renderCars(filtered);

      const countLine = document.getElementById("countLine");
      if (countLine) {
        countLine.textContent = garageIdParam
          ? `Showing ${filtered.length} cars from this garage.`
          : `Showing ${filtered.length} of ${ALL.length} cars.`;
      }
    }

    function resetFilters() {
      document.getElementById("searchBox").value = "";
      document.getElementById("sortBox").value = "recent";
      document.getElementById("fuelBox").value = "";
      document.getElementById("gearBox").value = "";
      document.getElementById("maxPriceBox").value = "";

      const u = new URL(window.location.href);
      u.searchParams.delete("garageId");
      window.history.replaceState({}, "", u.pathname + (u.searchParams.toString() ? "?" + u.searchParams.toString() : ""));
      applyFilters();
    }

    (async function init() {
      const status = document.getElementById("status");
      const applyBtn = document.getElementById("applyBtn");
      const resetBtn = document.getElementById("resetBtn");
      const filtersBar = document.getElementById("filtersBar");
      const toggleBtn = document.getElementById("toggleFilters");

      if (applyBtn) applyBtn.disabled = true;

      const cars = await fetchCars();
      if (!cars) {
        status.textContent = "Could not load cars.";
        const countLine = document.getElementById("countLine");
        if (countLine) countLine.textContent = "Could not load.";
        if (applyBtn) applyBtn.disabled = false;
        return;
      }

      ALL = cars;
      fillDropdowns(ALL);
      applyFilters();
      if (applyBtn) applyBtn.disabled = false;

      function closeMobileFilters() {
        if (filtersBar && filtersBar.classList.contains("is-open")) {
          filtersBar.classList.remove("is-open");
          if (toggleBtn) {
            toggleBtn.setAttribute("aria-expanded", "false");
            toggleBtn.textContent = "Filters";
          }
        }
      }

      if (toggleBtn && filtersBar) {
        toggleBtn.addEventListener("click", () => {
          const open = filtersBar.classList.toggle("is-open");
          toggleBtn.setAttribute("aria-expanded", open ? "true" : "false");
          toggleBtn.textContent = open ? "Close filters" : "Filters";
        });
      }

      if (applyBtn) {
        applyBtn.addEventListener("click", () => {
          applyFilters();
          if (window.matchMedia("(max-width:980px)").matches) closeMobileFilters();
        });
      }

      if (resetBtn) {
        resetBtn.addEventListener("click", () => {
          resetFilters();
          if (window.matchMedia("(max-width:980px)").matches) closeMobileFilters();
        });
      }

      let searchTimer = null;
      const searchBox = document.getElementById("searchBox");
      if (searchBox) {
        searchBox.addEventListener("input", () => {
          clearTimeout(searchTimer);
          searchTimer = setTimeout(applyFilters, 140);
        });
      }

      const sortBox = document.getElementById("sortBox");
      const fuelBox = document.getElementById("fuelBox");
      const gearBox = document.getElementById("gearBox");
      const maxPriceBox = document.getElementById("maxPriceBox");

      if (sortBox) sortBox.addEventListener("change", applyFilters);
      if (fuelBox) fuelBox.addEventListener("change", applyFilters);
      if (gearBox) gearBox.addEventListener("change", applyFilters);
      if (maxPriceBox) maxPriceBox.addEventListener("change", applyFilters);

      /*document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          applyFilters();
          if (window.matchMedia("(max-width:980px)").matches) closeMobileFilters();
        }
        if (e.key === "Escape") closeMobileFilters();
      });*/
    })();
  </script>

  <button id="backToTop" class="backToTop" type="button" aria-label="Back to top">
    ↑ Top
  </button>

  <script>
    const backToTopBtn = document.getElementById("backToTop");

    window.addEventListener("scroll", () => {
      if (window.scrollY > 500) {
        backToTopBtn.classList.add("show");
      } else {
        backToTopBtn.classList.remove("show");
      }
    });

    backToTopBtn.addEventListener("click", () => {
      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    });
  </script>
</body>

</html>
