<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage Login | IOW Car Finder</title>
</head>

<body>

    <h1>Garage Login</h1>

    <p>Sign in to manage your dealership.</p>

    <form id="loginForm">

        <label>Email</label><br>
        <input type="email" id="email" required>

        <br><br>

        <label>Password</label><br>
        <input type="password" id="password" required>

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

    <p id="message"></p>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = "https://mptyddctygpxmpvlqpgt.supabase.co";
        const supabaseKey = "sb_publishable_PGPGeL1Ly2KfV8fgb6E15Q_zQpeHxCE";

        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        const form = document.getElementById("loginForm");
        const message = document.getElementById("message");

        async function redirectIfAlreadyLoggedIn() {
            const { data, error } = await supabaseClient.auth.getSession();

            if (error) {
                console.error("Session check error:", error);
                return;
            }

            if (data.session) {
                window.location.href = "/garage-dashboard";
            }
        }

        redirectIfAlreadyLoggedIn();

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                message.textContent = error.message;
                return;
            }

            message.textContent = "Login successful!";
            window.location.href = "/garage-dashboard";
        });

    </script>

</body>

</html>
