<!DOCTYPE html>
<html lang="en">

<head>
  <script src="/cookie-consent.js" defer></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Page Not Found | IOW Car Finder</title>
  <meta name="description" content="The page you are looking for could not be found on IOW Car Finder.">
  <meta name="robots" content="noindex, nofollow">

  <style>
    :root {
      --navy: #07111d;
      --orange: #e67e22;
      --bg: #f6f7f9;
      --text: #111827;
      --muted: #667085;
      --card: #ffffff;
      --border: rgba(17, 24, 39, .10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(900px 480px at 10% -10%, rgba(230, 126, 34, .14), transparent 60%),
        linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--navy);
      color: #fff;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .top {
      width: 100%;
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 28px;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      color: #fff;
      text-decoration: none;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -.4px;
      white-space: nowrap;
    }

    .brand span {
      color: var(--orange);
    }

    nav {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    nav a {
      color: rgba(255, 255, 255, .86);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 800;
    }

    nav a:hover {
      color: #fff;
    }

    main {
      min-height: calc(100vh - 64px);
      display: grid;
      place-items: center;
      padding: 34px 18px;
    }

    .card {
      width: min(720px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 26px;
      box-shadow: 0 18px 46px rgba(15, 23, 42, .10);
      padding: 34px;
      text-align: center;
    }

    .code {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 76px;
      height: 76px;
      border-radius: 22px;
      background: rgba(230, 126, 34, .12);
      color: var(--orange);
      font-size: 1.5rem;
      font-weight: 950;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 6vw, 3.4rem);
      line-height: 1;
      letter-spacing: -.05em;
      color: var(--navy);
    }

    p {
      margin: 0 auto 22px;
      max-width: 52ch;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 13px 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 900;
      border: 1px solid transparent;
    }

    .btn.primary {
      background: var(--orange);
      color: #fff;
      box-shadow: 0 10px 24px rgba(230, 126, 34, .22);
    }

    .btn.ghost {
      background: #fff;
      color: var(--navy);
      border-color: rgba(17, 24, 39, .14);
    }

    @media (max-width: 700px) {
      .top {
        padding: 0 12px;
        min-height: 58px;
        gap: 10px;
      }

      .brand {
        font-size: .95rem;
      }

      nav {
        gap: 11px;
      }

      nav a {
        font-size: .82rem;
      }

      main {
        min-height: calc(100vh - 58px);
        padding: 22px 14px;
      }

      .card {
        padding: 26px 18px;
        border-radius: 22px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="top">
      <a class="brand" href="/"><span>IOW</span> Car Finder</a>

      <nav>
        <a href="/">Home</a>
        <a href="/cars-page">Cars</a>
        <a href="/garages">Garages</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="card">
      <div class="code">404</div>
      <h1>Page not found</h1>
      <p>
        Sorry, we could not find that page. The listing may have moved, or the address may have been typed incorrectly.
      </p>

      <div class="actions">
        <a class="btn primary" href="/cars-page">Browse cars</a>
        <a class="btn ghost" href="/garages">View garages</a>
        <a class="btn ghost" href="/">Back home</a>
      </div>
    </section>
  </main>
</body>

</html>
