<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Garages | IOW Car Finder</title>

  <style>
    
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #111827;
    }
    

    header a {
      color: #fff;
      text-decoration: none;
      font-weight: 800;
    }

    header {
      background: #07111d;
      color: #fff;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .top {
      max-width: 1040px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
    }

    .brand {
      color: #fff;
      text-decoration: none;
      font-weight: 900;
      letter-spacing: -.4px;
      font-size: 1.05rem;
    }

    .brand span {
      color: #e67e22;
    }

    nav {
      display: flex;
      gap: 16px;
    }

    nav a {
      color: rgba(255, 255, 255, .82);
      text-decoration: none;
      font-size: .9rem;
      font-weight: 800;
    }

    nav a:hover {
      color: #fff;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px 14px 32px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.8rem;
    }

    .intro {
      margin: 0 0 18px;
      color: #667085;
      line-height: 1.4;
    }

    #garageList {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }

    .garageCard {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(0, 0, 0, .08);
      box-shadow: 0 8px 24px rgba(0, 0, 0, .06);
    }

    .photoGrid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 3px;
      padding: 3px;
      background: #f3f4f6;
    }

    .noPhoto {
      width: 100%;
      height: 210px;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 8px;
    }

    .noPhoto img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .forecourtPhoto {
      width: 100%;
      height: 210px;
      object-fit: cover;
      display: block;
    }

    .photoGrid a {
      display: block;
    }

    .photoGrid a img {
      width: 100%;
      height: 105px;
      object-fit: cover;
      display: block;
      border-radius: 8px;
      background: #e5e7eb;
    }

    .garageInfo {
      padding: 14px;
    }

    .garageInfo h2 {
      margin: 0 0 4px;
      font-size: 1.18rem;
      color: #111827;
    }

    .garageInfo p {
      margin: 0 0 10px;
      color: #667085;
    }

    .count {
      font-weight: 900;
      color: #111827 !important;
    }

    .viewBtn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 14px;
      border-radius: 12px;
      background: #e67e22;
      color: #fff;
      text-decoration: none;
      font-weight: 800;
    }

    .status {
      background: #fff;
      padding: 14px;
      border-radius: 14px;
      color: #667085;
      border: 1px solid rgba(0, 0, 0, .08);
    }

    @media (max-width: 650px) {

      header {
        padding: 14px;
      }

      .top {
        gap: 12px;
      }

      nav {
        gap: 12px;
      }

      nav a {
        font-size: .84rem;
      }

      main {
        padding: 16px 12px 28px;
      }

      #garageList {
        grid-template-columns: 1fr;
      }

      .photoGrid a img {
        height: 105px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="top">
      <a class="brand" href="/"><span>IOW</span> Car Finder</a>

      <nav>
        <a href="/">Home</a>
        <a href="/cars-page">Cars</a>
      </nav>
    </div>
  </header>

  <main>
    <h1>Browse Garages</h1>
    <p class="intro">Find local Isle of Wight garages and view their available stock.</p>

    <div id="garageList" class="status">Loading garages...</div>
  </main>

  <script>
    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[ch]));
    }

    function getCarPhoto(car) {
      if (!car) return "";
      if (Array.isArray(car.photos) && car.photos.length) return car.photos[0];
      if (car.photo) return car.photo;
      return "";
    }

    async function loadGarages() {
      const garageList = document.getElementById("garageList");

      try {
        const garagesRes = await fetch("/garages-data", { cache: "no-store" });
        const carsRes = await fetch("/cars", { cache: "no-store" });

        const garages = await garagesRes.json();
        const carsData = await carsRes.json();
        const cars = Array.isArray(carsData) ? carsData : carsData.cars || [];

        if (!Array.isArray(garages) || garages.length === 0) {
          garageList.textContent = "No garages listed yet.";
          return;
        }

        garageList.classList.remove("status");

        garageList.innerHTML = garages.map(g => {
          const garageCars = Array.isArray(cars)
            ? cars.filter(c => String(c.garageId || c.garage_id || "") === String(g.id || ""))
            : [];

          const photos = garageCars
            .map(car => getCarPhoto(car))
            .filter(Boolean)
            .slice(0, 4);

          const carWord = garageCars.length === 1 ? "car" : "cars";

          return `
            <div class="garageCard">
${photos.length
              ? `
      <div class="photoGrid">
        ${garageCars.slice(0, 4).map(car => `
          <a href="/car?id=${encodeURIComponent(car.id)}">
            <img src="${escapeHtml(getCarPhoto(car))}" alt="${escapeHtml(car.name || g.name)}">
          </a>
        `).join("")}
      </div>
    `
              : g.forecourtPhoto
                ? `
        <img class="forecourtPhoto"
             src="${escapeHtml(g.forecourtPhoto)}"
             alt="${escapeHtml(g.name)}">
      `
                : `<div class="noPhoto">
    <img src="/images/garage-placeholder.webp" alt="Garage">
</div>`
            }
              <div class="garageInfo">
                <h2>${escapeHtml(g.name)}</h2>
                <p>${escapeHtml(g.town || "Isle of Wight")}</p>
                <p class="count">${garageCars.length} ${carWord} in stock</p>

                <a class="viewBtn" href="/garage?id=${encodeURIComponent(g.id)}">
                  View Garage →
                </a>
              </div>
            </div>
          `;
        }).join("");

      } catch (e) {
        garageList.textContent = "Could not load garages.";
      }
    }

    loadGarages();
  </script>

</body>

</html>
