<!DOCTYPE html>
<html lang="en">

<head>

    <script src="/cookie-consent.js" defer></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage Profile | IOW Car Finder</title>

    <meta name="description"
        content="View an approved Isle of Wight garage profile, contact details and current used car listings on IOW Car Finder.">
    <meta name="robots" content="noindex, nofollow">

    <link rel="canonical" href="https://www.iowcarfinder.co.uk/garage">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Garage Profile | IOW Car Finder">
    <meta property="og:description"
        content="View an approved Isle of Wight garage profile, contact details and current used car listings on IOW Car Finder.">
    <meta property="og:url" content="https://www.iowcarfinder.co.uk/garage">
    <meta property="og:image" content="https://www.iowcarfinder.co.uk/images/hero-desktop.webp">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Garage Profile | IOW Car Finder">
    <meta name="twitter:description"
        content="View an approved Isle of Wight garage profile, contact details and current used car listings on IOW Car Finder.">
    <meta name="twitter:image" content="https://www.iowcarfinder.co.uk/images/hero-desktop.webp">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #111827;
        }

        /* ---------- Header ---------- */
        header {
            background: #07111d;
            color: #fff;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
        }

        .top {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 28px;
            min-height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .brand {
            color: #fff;
            text-decoration: none;
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -.4px;
            white-space: nowrap;
        }

        .brand span {
            color: #e67e22;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        nav a {
            color: rgba(255, 255, 255, .86);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 800;
            line-height: 1;
        }

        nav a:hover {
            color: #fff;
        }

        @media (max-width:700px) {
            .top {
                padding: 0 12px;
                min-height: 58px;
                gap: 10px;
            }

            .brand {
                font-size: .95rem;
                white-space: nowrap;
            }

            nav {
                gap: 11px;
            }

            nav a {
                font-size: .82rem;
            }
        }

        main {
            max-width: 1120px;
            margin: 0 auto;
            padding: 28px 18px 54px;
        }

        .garageHero {
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(circle at top left, rgba(230, 126, 34, .16), transparent 32%),
                linear-gradient(135deg, #07111d, #10263d);
            color: #fff;
            border-radius: 28px;
            padding: 34px;
            display: grid;
            grid-template-columns: 1fr 220px;
            gap: 28px;
            align-items: center;
            box-shadow: 0 18px 48px rgba(15, 23, 42, .16);
            margin-bottom: 18px;
        }

        .garageHero::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: var(--garage-banner, none);
            background-size: cover;
            background-position: center;
            opacity: .16;
            z-index: 0;
        }

        .garageHero>div,
        .garageHero>aside {
            position: relative;
            z-index: 1;
        }

        .garageLogoBox {
            width: 104px;
            height: 104px;
            margin-bottom: 18px;
            border-radius: 22px;
            background: #fff;
            border: 1px solid rgba(255, 255, 255, .22);
            box-shadow: 0 12px 28px rgba(0, 0, 0, .18);
            padding: 10px;
        }

        .garageLogoBox img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .eyebrow {
            color: rgba(255, 255, 255, .68);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: .08em;
            font-size: .78rem;
            margin-bottom: 10px;
        }

        .garageHero h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 5vw, 3.15rem);
            line-height: 1.02;
            letter-spacing: -1.5px;
        }

        .garageIntro {
            margin: 0 0 18px;
            color: rgba(255, 255, 255, .78);
            line-height: 1.55;
            max-width: 60ch;
        }

        .garageMeta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 18px;
            margin-top: 14px;
        }

        .metaPill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0;
            border: 0;
            border-radius: 0;
            background: transparent;
            color: rgba(255, 255, 255, .82);
            font-size: .9rem;
            font-weight: 700;
        }

        .garageActions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 22px;
        }

        .actionBtn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 11px 15px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 900;
            background: #e67e22;
            color: #fff;
        }

        .actionBtn.secondary {
            background: rgba(255, 255, 255, .12);
            border: 1px solid rgba(255, 255, 255, .16);
        }

        .stockBox {
            background: rgba(255, 255, 255, .10);
            border: 1px solid rgba(255, 255, 255, .14);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
        }

        .stockCount {
            font-size: 3rem;
            line-height: 1;
            font-weight: 950;
            color: #e67e22;
        }

        .stockLabel {
            margin-top: 8px;
            color: rgba(255, 255, 255, .72);
            font-weight: 800;
        }

        .stockLink {
            display: inline-flex;
            margin-top: 18px;
            color: #fff;
            text-decoration: none;
            font-weight: 900;
        }

        .stockSection {
            background: #fff;
            border: 1px solid rgba(17, 24, 39, .08);
            border-radius: 26px;
            box-shadow: 0 14px 40px rgba(15, 23, 42, .07);
            padding: 24px;
        }

        .sectionHead {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 18px;
        }

        .sectionHead .eyebrow {
            color: #c96513;
            margin-bottom: 6px;
        }

        .sectionHead h2 {
            margin: 0;
            font-size: 1.45rem;
            color: #07111d;
        }

        .carsGrid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }

        .carCard {
            background: #fff;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 26px rgba(15, 23, 42, .08);
            border: 1px solid rgba(17, 24, 39, .08);
        }

        .carImgWrap {
            position: relative;
            background: #e5e7eb;
        }

        .carImgWrap img {
            width: 100%;
            height: 190px;
            object-fit: cover;
            display: block;
            background: #e5e7eb;
        }

        .carCard.sold .carImgWrap img {
            filter: grayscale(100%);
            opacity: .72;
        }

        .stockBadge {
            position: absolute;
            left: 12px;
            top: 12px;
            padding: 7px 11px;
            border-radius: 999px;
            color: #fff;
            font-weight: 950;
            font-size: .78rem;
            letter-spacing: .04em;
            box-shadow: 0 8px 18px rgba(0, 0, 0, .22);
        }

        .stockBadge.sold {
            background: rgba(17, 24, 39, .92);
        }

        .stockBadge.reserved {
            background: rgba(230, 126, 34, .96);
        }

        .carInfo {
            padding: 15px;
        }

        .carInfo h3 {
            margin: 0 0 7px;
            font-size: 1.05rem;
            line-height: 1.25;
            color: #111827;
        }

        .price {
            font-weight: 950;
            font-size: 1.45rem;
            margin: 0 0 8px;
            color: #07111d;
        }

        .small {
            color: #667085;
            margin: 0 0 13px;
            line-height: 1.45;
        }

        .viewBtn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 14px;
            border-radius: 999px;
            background: #e67e22;
            color: #fff;
            text-decoration: none;
            font-weight: 900;
        }

        .emptyState {
            color: #667085;
            background: #f8fafc;
            border: 1px dashed rgba(17, 24, 39, .16);
            border-radius: 18px;
            padding: 22px;
        }

        @media (max-width: 900px) {
            .garageHero {
                grid-template-columns: 1fr;
            }

            .stockBox {
                text-align: left;
            }

            .carsGrid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            main {
                padding: 18px 12px 42px;
            }

            .garageHero {
                padding: 26px 22px;
                border-radius: 24px;
            }

            .garageMeta {
                display: grid;
                gap: 8px;
            }

            .garageActions {
                display: grid;
                grid-template-columns: 1fr;
                justify-items: center;
            }

            .actionBtn {
                width: 100%;
                max-width: 340px;
            }

            .stockBox {
                text-align: center;
            }

            .stockLink {
                justify-content: center;
            }

            .stockSection {
                padding: 20px;
                border-radius: 22px;
            }

            .carsGrid {
                grid-template-columns: 1fr;
            }

            .carImgWrap img {
                height: 220px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="top">
            <a class="brand" href="/">
                <span>IOW</span> Car Finder
            </a>

            <nav>
                <a href="/">Home</a>
                <a href="/cars-page">Cars</a>
                <a href="/garages">Garages</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="garageHero">
            <div>
                <div id="garageLogoBox" class="garageLogoBox" style="display:none;"></div>
                <div class="eyebrow">Island garage</div>
                <h1 id="garageName">Loading garage...</h1>
                <p id="garageIntro" class="garageIntro"></p>

                <div id="garageMeta" class="garageMeta"></div>

                <div id="garageActions" class="garageActions"></div>
            </div>

            <aside class="stockBox">
                <div id="stockCount" class="stockCount">—</div>
                <div class="stockLabel">available now</div>
                <a href="#stock" class="stockLink">View cars</a>
            </aside>
        </section>

        <section id="stock" class="stockSection">
            <div class="sectionHead">
                <div>
                    <div class="eyebrow">Garage listings</div>
                    <h2>Cars from this garage</h2>
                </div>
            </div>

            <div id="carsBox" class="carsGrid">Loading cars...</div>
        </section>
    </main>

    <script>
        function escapeHtml(value) {
            return String(value || "").replace(/[&<>"']/g, ch => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;"
            }[ch]));
        }

        function cloudinaryOptimise(url, transform = "f_auto,q_auto,c_limit,w_1200") {
            const u = String(url || "");

            if (!u.includes("res.cloudinary.com") || !u.includes("/image/upload/")) {
                return u;
            }

            return u.replace("/image/upload/", `/image/upload/${transform}/`);
        }

        function money(value) {
            return "£" + Number(value || 0).toLocaleString("en-GB");
        }

        function getCarPhoto(car) {
            let photo = "";

            if (car && Array.isArray(car.photos) && car.photos.length) {
                photo = car.photos[0];
            } else if (car && car.photo) {
                photo = car.photo;
            }

            if (!photo) return "/images/hero-desktop.webp";

            return cloudinaryOptimise(photo, "f_auto,q_auto,c_fill,w_700,h_438");
        }

        async function loadGarage() {
            const params = new URLSearchParams(window.location.search);
            const garageId = params.get("id");
            const garageHero = document.querySelector(".garageHero");
            const garageName = document.getElementById("garageName");
            const garageLogoBox = document.getElementById("garageLogoBox");
            const garageIntro = document.getElementById("garageIntro");
            const garageMeta = document.getElementById("garageMeta");
            const garageActions = document.getElementById("garageActions");
            const stockCount = document.getElementById("stockCount");
            const carsBox = document.getElementById("carsBox");

            if (!garageId) {
                window.location.href = "/garages";
                return;
            }

            try {
                const garagesRes = await fetch("/garages-data", { cache: "no-store" });
                const carsRes = await fetch("/cars", { cache: "no-store" });

                const garages = await garagesRes.json();
                const carsData = await carsRes.json();
                const cars = Array.isArray(carsData) ? carsData : carsData.cars || [];

                const garage = garages.find(g => String(g.id) === String(garageId));

                if (!garage) {
                    garageName.textContent = "Garage not found";
                    garageIntro.textContent = "We could not find this garage.";
                    carsBox.innerHTML = "";
                    return;
                }

                const garageCars = cars.filter(car =>
                    String(car.garageId || car.garage_id || "") === String(garageId)
                );

                const sortedGarageCars = [...garageCars].sort((a, b) => {

                    function statusRank(car) {
                        const status = String(car.status || "").toLowerCase();

                        if (status === "sold" || car.sold === true) return 2;
                        if (status === "reserved") return 1;

                        return 0;
                    }

                    const rankDiff = statusRank(a) - statusRank(b);
                    if (rankDiff !== 0) return rankDiff;

                    const ta = new Date(a.updatedAt || a.updated_at || a.createdAt || a.created_at || 0).getTime() || 0;
                    const tb = new Date(b.updatedAt || b.updated_at || b.createdAt || b.created_at || 0).getTime() || 0;

                    return tb - ta;
                });

                const availableCount = garageCars.filter(car => {
                    const status = String(car.status || "").toLowerCase();

                    if (status === "sold" || car.sold === true) return false;
                    if (status === "reserved") return false;

                    return true;
                }).length;

                /*
                const callBtn = document.getElementById("callBtn");
                const mapBtn = document.getElementById("mapBtn");
                const moreBtn = document.getElementById("moreBtn");

                if (garage.phone) {
                    callBtn.href = "tel:" + garage.phone.replace(/\s+/g, "");
                } else {
                    callBtn.style.display = "none";
                }

                if (garage.address) {
                    mapBtn.href =
                        "https://www.google.com/maps/search/?api=1&query=" +
                        encodeURIComponent(garage.address);
                } else {
                    mapBtn.style.display = "none";
                }

                moreBtn.href = "/garage?id=" + encodeURIComponent(garage.id);
                */

                garageName.textContent = garage.name || "Garage";

                const rawBannerUrl = garage.banner_url || garage.bannerUrl || "";
                const bannerUrl = cloudinaryOptimise(rawBannerUrl, "f_auto,q_auto,c_fill,w_1400,h_420");

                if (garageHero) {
                    const safeBannerUrl = String(bannerUrl).replace(/"/g, "%22");
                    garageHero.style.setProperty("--garage-banner", safeBannerUrl ? `url("${safeBannerUrl}")` : "none");
                }

                const rawLogoUrl = garage.logo_url || garage.logoUrl || "";
                const logoUrl = cloudinaryOptimise(rawLogoUrl, "f_auto,q_auto,c_limit,w_300");

                if (garageLogoBox) {
                    if (logoUrl) {
                        garageLogoBox.style.display = "block";
                        garageLogoBox.innerHTML = `<img src="${escapeHtml(logoUrl)}" alt="${escapeHtml(garage.name || "Garage")} logo">`;
                    } else {
                        garageLogoBox.style.display = "none";
                        garageLogoBox.innerHTML = "";
                    }
                }

                if (garage.description && garage.description.trim()) {
                    garageIntro.textContent = garage.description;
                    garageIntro.style.display = "block";
                } else {
                    garageIntro.textContent = "";
                    garageIntro.style.display = "none";
                }

                stockCount.textContent = availableCount;

                const metaItems = [];

                const addressText = String(garage.address || "").trim();
                const townText = String(garage.town || "").trim();
                const postcodeText = String(garage.postcode || "").trim();

                const locationParts = [];

                if (addressText) {
                    locationParts.push(addressText);
                }

                if (
                    townText &&
                    !locationParts.join(" ").toLowerCase().includes(townText.toLowerCase())
                ) {
                    locationParts.push(townText);
                }

                if (
                    postcodeText &&
                    !locationParts.join(" ").toLowerCase().includes(postcodeText.toLowerCase())
                ) {
                    locationParts.push(postcodeText);
                }

                metaItems.push(
                    `📍 ${escapeHtml(locationParts.join(", ") || "Isle of Wight")}`
                );

                if (garage.opening_hours || garage.openingHours) {
                    metaItems.push(
                        `🕒 ${escapeHtml(garage.opening_hours || garage.openingHours)}`
                    );
                }

                garageMeta.innerHTML = metaItems
                    .map(item => `<span class="metaPill">${item}</span>`)
                    .join("");

                const actions = [];

                if (garage.phone) {
                    actions.push(`
    <a class="actionBtn" href="tel:${escapeHtml(garage.phone).replace(/\s+/g, "")}">
      Call garage
    </a>
  `);
                }

                if (garage.email) {
                    actions.push(`
    <a class="actionBtn secondary"
       href="mailto:${escapeHtml(String(garage.email).trim())}?subject=${encodeURIComponent("Enquiry via IOW Car Finder")}">
      Email garage
    </a>
  `);
                }

                const mapQuery = garage.postcode || garage.address || garage.town || "";

                if (mapQuery) {
                    actions.push(`
    <a class="actionBtn secondary" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(mapQuery)}" target="_blank" rel="noopener">
      Directions
    </a>
  `);
                }

                if (garage.website) {
                    actions.push(`
    <a class="actionBtn secondary" href="${escapeHtml(garage.website)}" target="_blank" rel="noopener">
     Visit website
    </a>
  `);
                }

                garageActions.innerHTML = actions.join("");

                if (!garageCars.length) {
                    carsBox.innerHTML = `
    <div class="emptyState">
      No cars currently listed for this garage.
    </div>
  `;
                    return;
                }

                carsBox.innerHTML = sortedGarageCars.map(car => {
                    const status = String(car.status || "").toLowerCase();
                    const isSold = status === "sold" || car.sold === true;
                    const isReserved = status === "reserved";

                    return `
  <div class="carCard ${isSold ? "sold" : ""}">
    <div class="carImgWrap">
      <img src="${escapeHtml(getCarPhoto(car))}" alt="${escapeHtml(car.name)}" loading="lazy" decoding="async">
      ${isSold ? `<span class="stockBadge sold">SOLD</span>` : ""}
      ${isReserved ? `<span class="stockBadge reserved">RESERVED</span>` : ""}
    </div>

    <div class="carInfo">
      <h3>${escapeHtml(car.name)}</h3>
      <p class="price">${money(car.price)}</p>
      <p class="small">${escapeHtml(car.year || "")} · ${escapeHtml(car.fuel || "")} · ${escapeHtml(car.transmission || "")}</p>
      <a class="viewBtn" href="/car?id=${encodeURIComponent(car.id || car.name)}">View car →</a>
    </div>
  </div>
`;
                }).join("");

            } catch (e) {
                console.error(e);
                garageName.textContent = "Could not load garage";
                garageIntro.textContent = "Something went wrong while loading this garage profile.";
                carsBox.innerHTML = "";
            }
        }

        loadGarage();
    </script>

</body>

</html>
